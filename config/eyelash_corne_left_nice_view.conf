# Disable the nice_view shield's built-in status screen (with WPM graph)
# so we can provide our own layout with a BLE text area.
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# Our custom screen (custom_status_screen.c) provides zmk_display_status_screen()
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Keep standard status widgets (sans WPM)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
